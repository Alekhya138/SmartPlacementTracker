<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aptitude — Smart Placement Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-root"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Aptitude tracker</div>
        <h1>Aptitude progress</h1>
      </div>
    </div>

    <div class="grid cols-4" id="apt-summary"></div>

    <div class="grid cols-2 mt-24">
      <div class="card">
        <h3>Log a score</h3>
        <form id="apt-form">
          <div class="field"><label>Category</label>
            <select id="apt-category">
              <option>Quantitative</option>
              <option>Logical Reasoning</option>
              <option>Verbal</option>
            </select>
          </div>
          <div class="grid cols-2">
            <div class="field"><label>Score</label><input type="number" id="apt-score" required min="0" max="100"></div>
            <div class="field"><label>Date</label><input type="date" id="apt-date" required></div>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Add score</button>
        </form>
      </div>
      <div class="card">
        <h3>Trend</h3>
        <canvas id="apt-chart" height="220"></canvas>
      </div>
    </div>

    <div class="card mt-24">
      <h3>History</h3>
      <table>
        <thead><tr><th>Date</th><th>Category</th><th>Score</th></tr></thead>
        <tbody id="apt-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/aptitude.js"></script>
</body>
</html>
