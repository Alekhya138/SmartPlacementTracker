<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding — Smart Placement Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-root"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Coding tracker</div>
        <h1>Coding progress</h1>
      </div>
    </div>

    <div class="grid cols-4" id="coding-summary"></div>

    <div class="grid cols-2 mt-24">
      <div class="card">
        <h3>Log today's practice</h3>
        <form id="coding-form">
          <div class="field"><label>Date</label><input type="date" id="cd-date" required></div>
          <div class="grid cols-2">
            <div class="field"><label>Platform</label>
              <select id="cd-platform">
                <option>LeetCode</option><option>GeeksforGeeks</option><option>HackerRank</option>
                <option>CodeChef</option><option>Codeforces</option>
              </select>
            </div>
            <div class="field"><label>Problems solved</label><input type="number" id="cd-count" min="0" value="1"></div>
          </div>
          <div class="field"><label>Difficulty</label>
            <select id="cd-difficulty"><option>Easy</option><option>Medium</option><option>Hard</option></select>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Log practice</button>
        </form>
      </div>
      <div class="card">
        <h3>Difficulty distribution</h3>
        <canvas id="diff-chart" height="220"></canvas>
      </div>
    </div>

    <div class="card mt-24">
      <h3>90-day heatmap</h3>
      <div id="heatmap" style="display:grid; grid-template-columns:repeat(30, 1fr); gap:4px;"></div>
    </div>

    <div class="card mt-24">
      <h3>History</h3>
      <table>
        <thead><tr><th>Date</th><th>Platform</th><th>Problems</th><th>Difficulty</th></tr></thead>
        <tbody id="coding-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/coding.js"></script>
</body>
</html>
