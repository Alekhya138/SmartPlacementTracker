<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companies — Smart Placement Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-root"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Company tracker</div>
        <h1>Applications</h1>
      </div>
      <button class="btn btn-primary" id="open-add">+ Add company</button>
    </div>

    <div class="grid cols-4" id="summary-cards"></div>

    <div class="card mt-24">
      <div class="flex justify-between items-center gap-16 mt-8" style="margin-bottom:14px;">
        <input type="text" id="search-input" placeholder="Search by company or role..." style="max-width:280px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text);">
        <select id="status-filter" style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text);">
          <option value="">All statuses</option>
          <option>Interested</option>
          <option>Applied</option>
          <option>OA Scheduled</option>
          <option>OA Cleared</option>
          <option>Interview Scheduled</option>
          <option>HR Round</option>
          <option>Selected</option>
          <option>Rejected</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>Company</th><th>Role</th><th>Package</th><th>Location</th><th>Deadline</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="companies-tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">
        <div class="icon">▤</div>
        No applications yet — add your first company to start tracking.
      </div>
    </div>
  </div>
</div>

<!-- Add / edit modal -->
<div id="modal-backdrop" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:100;">
  <div class="card" style="width:100%; max-width:440px;">
    <h3 id="modal-title">Add company</h3>
    <form id="company-form">
      <input type="hidden" id="c-id">
      <div class="field"><label>Company name</label><input type="text" id="c-name" required></div>
      <div class="grid cols-2">
        <div class="field"><label>Role</label><input type="text" id="c-role" required></div>
        <div class="field"><label>Package (LPA)</label><input type="number" step="0.1" id="c-package"></div>
      </div>
      <div class="grid cols-2">
        <div class="field"><label>Location</label><input type="text" id="c-location"></div>
        <div class="field"><label>Status</label>
          <select id="c-status">
            <option>Interested</option><option>Applied</option><option>OA Scheduled</option>
            <option>OA Cleared</option><option>Interview Scheduled</option><option>HR Round</option>
            <option>Selected</option><option>Rejected</option>
          </select>
        </div>
      </div>
      <div class="grid cols-2">
        <div class="field"><label>Application date</label><input type="date" id="c-appdate"></div>
        <div class="field"><label>Deadline</label><input type="date" id="c-deadline"></div>
      </div>
      <div class="flex gap-12 mt-16">
        <button type="button" class="btn btn-ghost w-full" id="close-modal">Cancel</button>
        <button type="submit" class="btn btn-primary w-full">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/companies.js"></script>
</body>
</html>
